<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Stack Tech Exam</title>
  <link rel="stylesheet" href="/styles/style.css">
</head>
<body>
  <main class="container">
    <h1>Full Stack Tech Exam</h1>

    <p class="note">
      Search for a stored name and get its emoji from the server.
      If needed, initialize your data first by visiting
      <code>/api/init-emoji</code> once.
    </p>

    <section>
      <h2>Search for Name</h2>

      <div class="search-box">
        <label for="userName">Enter name:</label>
        <input id="userName" name="userName" placeholder="Enter a name (e.g., arun)" required>
        <button id="searchBtn" type="button">Search</button>
      </div>

      <div id="result" class="result"></div>
    </section>
  </main>

  <script src="/scripts/main.js"></script>
</body>
</html>
