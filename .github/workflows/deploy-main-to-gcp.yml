name: deploy-main-to-gcp

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over SSH
        shell: bash
        run: |
          ssh -i ~/.ssh/id_rsa -T "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << EOF
          set -e

          cd "${{ vars.APP_DIR }}"
          git fetch origin
          git reset --hard origin/main
          npm install

          pm2 delete "${{ vars.PM2_NAME }}" || true
          pm2 start app.mjs --name "${{ vars.PM2_NAME }}"

          pm2 save
          EOF
