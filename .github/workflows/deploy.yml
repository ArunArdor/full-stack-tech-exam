name: Deploy to GCP VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup SSH key
      run: |
        echo "${{ secrets.SSH_SOLID_KEY }}" > private_key.pem
        chmod 600 private_key.pem

    - name: Deploy to VM
      run: |
        ssh -o StrictHostKeyChecking=no -i private_key.pem arunbatta821@34.135.34.245 << 'EOF'
        cd ~/full-stack-tech-exam
        git pull
        npm install
        pm2 restart exam-app || pm2 start app.mjs --name exam-app
        EOF
